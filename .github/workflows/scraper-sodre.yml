# ===== scraper-sodre.yml =====
name: Sodré Santoro

on:
  schedule:
    - cron: '0 6 15 * *'  # Dia 15 de cada mês às 6h UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3h (script tem timeout interno de 2h58min)
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache Playwright
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      
      - name: Instalar deps
        run: |
          pip install playwright requests
          playwright install chromium --with-deps
      
      - name: Rodar scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          cd scrapers
          python -u sodre_scraper.py --full-update
      
      - name: Upload logs em caso de erro
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sodre-error-logs-${{ github.run_number }}
          path: scrapers/sodre_data/*.json
          retention-days: 7